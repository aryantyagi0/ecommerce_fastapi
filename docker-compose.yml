      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      PORT: "8000"
      DATABASE_URL: "postgresql://postgres:Mahiipl9917@db.nugpynyrkmlsgdlwwerp.supabase.co:5432/postgres"
    depends_on:
      - db
    restart: always

volumes:
  postgres_data:
