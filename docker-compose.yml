version: "3.8"
services:
  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Mahiipl
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      PORT: "8000"
      DATABASE_URL: "postgresql://postgres:Mahiipl@9917@db.vjdbzczvykhixdlagmsw.supabase.co:5432/postgres"
    depends_on:
      - db
    restart: always

volumes:
  postgres_data:
